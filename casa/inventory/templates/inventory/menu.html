{% load static %}
<!DOCTYPE html>
<html lang="pt">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Gestão da Casa</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'inventory/css/ui-revamp.css' %}">

</head>

<body>

    <div class="container app-shell py-5">

        <div class="text-center mb-5">
            <h1 class="page-title">🏠 Gestão da Casa</h1>
            <p class="page-subtitle">Controle de inventário, desejos, despensa e gastos em um único painel.</p>
        </div>

        <div class="row g-4">

            <div class="col-6 col-md-4">

                <a href="{% url 'itens' %}" class="menu-link">

                    <div class="menu-tile">

                        <div class="menu-icon">📦</div>

                        <h5 class="mt-2">Itens</h5>

                    </div>

                </a>

            </div>
            <div class="col-6 col-md-4">

                <a href="{% url 'desejos' %}" class="menu-link">

                    <div class="menu-tile">

                        <div class="menu-icon">⭐</div>

                        <h5 class="mt-2">Desejos</h5>

                    </div>

                </a>

            </div>

            <div class="col-6 col-md-4">

                <a href="{% url 'lista_compras' %}" class="menu-link">

                    <div class="menu-tile">

                        <div class="menu-icon">🛒</div>

                        <h5 class="mt-2">Lista de Compras</h5>

                    </div>

                </a>

            </div>

           
<div class="col-6 col-md-4">

                <a href="{% url 'despensa' %}" class="menu-link">

                    <div class="menu-tile">

                        <div class="menu-icon">🍎</div>

                        <h5 class="mt-2">Despensa</h5>

                    </div>

                </a>

            </div>

            <div class="col-6 col-md-4">

                <a href="{% url 'gastos' %}" class="menu-link">

                    <div class="menu-tile">

                        <div class="menu-icon">💰</div>

                        <h5 class="mt-2">Gastos Items</h5>

                    </div>

                </a>

            </div>
            

        </div>

    </div>

</body>

</html>
