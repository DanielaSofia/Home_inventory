<!DOCTYPE html>
<html lang="pt">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Gestão da Casa</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f5f7fb;
        }

        .menu-card {
            border: none;
            border-radius: 18px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            transition: 0.2s;
            cursor: pointer;
        }

        .menu-card:hover {
            transform: scale(1.05);
        }

        .icon {
            font-size: 40px;
        }
    </style>

</head>

<body>

    <div class="container py-5">

        <h2 class="text-center mb-5">
            🏠 Gestão da Casa
        </h2>

        <div class="row g-4">

            <div class="col-6">

                <a href="{% url 'itens' %}" style="text-decoration:none">

                    <div class="card menu-card p-4 text-center">

                        <div class="icon">📦</div>

                        <h5 class="mt-2">Itens</h5>

                    </div>

                </a>

            </div>
             <div class="col-6">

                <a href="{% url 'desejos' %}" style="text-decoration:none">

                    <div class="card menu-card p-4 text-center">

                        <div class="icon">⭐</div>

                        <h5 class="mt-2">Desejos</h5>

                    </div>

                </a>

            </div>

            <div class="col-6">

                <a href="{% url 'lista_compras' %}" style="text-decoration:none">

                    <div class="card menu-card p-4 text-center">

                        <div class="icon">🛒</div>

                        <h5 class="mt-2">Lista de Compras</h5>

                    </div>

                </a>

            </div>

           
<div class="col-6">

                <a href="{% url 'despensa' %}"  style="text-decoration:none">

                    <div class="card menu-card p-4 text-center">

                        <div class="icon">💰</div>

                        <h5 class="mt-2">Despensa</h5>

                    </div>

                </a>

            </div>

            <div class="col-6">

                <a href="{% url 'gastos' %}" style="text-decoration:none">

                    <div class="card menu-card p-4 text-center">

                        <div class="icon">💰</div>

                        <h5 class="mt-2">Gastos Items</h5>

                    </div>

                </a>

            </div>
            

        </div>

    </div>

</body>

</html>
