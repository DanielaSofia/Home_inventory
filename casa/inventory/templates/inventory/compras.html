<!DOCTYPE html>
<html lang="pt">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Lista de Compras</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f5f7fb;
        }

        .card {
            border: none;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
        }

        .item {
            display: flex;
            align-items: center;
            padding: 12px;
            border-bottom: 1px solid #eee;
        }

        .item:last-child {
            border-bottom: none;
        }

        .nome {
            flex: 1;
            margin-left: 10px;
            font-size: 16px;
        }

        .comprado {
            text-decoration: line-through;
            color: gray;
        }
    </style>

</head>

<body>

    <div class="container py-5">

        <h2 class="mb-4">🛒 Lista de Compras</h2>

        <a href="/" class="btn btn-secondary mb-4">
            ⬅ Voltar
        </a>

        <div class="card p-4 mb-4">

            <form method="post">

                {% csrf_token %}

                <div class="row">

                    <div class="col-md-4">

                        <input name="nome" placeholder="Adicionar produto..." class="form-control" required>

                    </div>

                    <div class="col-md-2">

                        <select name="divisao" class="form-control">

                            <option value="">Divisão</option>

                            {% for d in divisoes %}

                            <option value="{{ d.id }}">
                                {{ d.nome }}
                            </option>

                            {% endfor %}

                        </select>

                    </div>
                    <div class="col-md-1">

                        <input type="number" name="quantidade" value="1" class="form-control">

                    </div>

                    <div class="col-md-2">

                        <button class="btn btn-primary w-100">
                            +
                        </button>

                    </div>

                </div>

            </form>

        </div>


        <div class="card">

            {% for c in compras %}

            <div class="item">

                <form method="post" action="{% url 'comprar_item' c.id %}">

                    {% csrf_token %}

                    <input type="checkbox" onchange="this.form.submit()" {% if c.comprado %}checked{% endif %}>

                </form>

                <div class="nome {% if c.comprado %}comprado{% endif %}">

                    {{ c.nome }}

                    <small class="text-muted">
                        x{{ c.quantidade }}
                    </small>
                        <span class="badge bg-secondary">
                            {% if c.divisao %}
                                {{ c.divisao.nome }}
                            {% endif %}
                        </span>
                </div>

                <a href="{% url 'apagar_compra' c.id %}" class="btn btn-sm btn-danger">
                    🗑
                </a>

            </div>

            {% empty %}

            <p class="p-3 text-muted">
                Lista vazia
            </p>

            {% endfor %}

        </div>

    </div>

</body>

</html>
