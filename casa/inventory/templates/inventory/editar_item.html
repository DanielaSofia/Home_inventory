{% load static %}
<!DOCTYPE html>
<html lang="pt">

<head>

     <meta charset="UTF-8">
     <meta name="viewport" content="width=device-width, initial-scale=1.0">

     <title>Editar Item</title>

     <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
     <link rel="preconnect" href="https://fonts.googleapis.com">
     <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
     <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
     <link rel="stylesheet" href="{% static 'inventory/css/ui-revamp.css' %}">

</head>

<body>

     <div class="container app-shell py-5">

          <div class="row justify-content-center">

               <div class="col-lg-7">

                    <div class="section-card p-4">

                         <h3 class="mb-4">
                              ✏️ Editar Item
                         </h3>

                         <form method="post" enctype="multipart/form-data">

                              {% csrf_token %}

                              <div class="mb-3">
                                   <label class="form-label">Nome</label>
                                   {{ form.nome }}
                              </div>

                              <div class="mb-3">
                                   <label class="form-label">Descrição</label>
                                   {{ form.descricao }}
                              </div>

                              <div class="row">

                                   <div class="col-md-6 mb-3">
                                        <label class="form-label">Quantidade</label>
                                        {{ form.quantidade }}
                                   </div>

                                   <div class="col-md-6 mb-3">
                                        <label class="form-label">Valor (€)</label>
                                        {{ form.valor }}
                                   </div>

                              </div>

                              <div class="mb-3">
                                   <label class="form-label">Divisão</label>
                                   {{ form.divisao }}
                              </div>

                              <div class="mb-3">
                                   <label class="form-label">Data de aquisição</label>
                                   {{ form.data_aquisicao }}
                              </div>

                              <div class="mb-3">

                                   <label class="form-label">Imagem</label>

                                   {{ form.imagem }}

                                   {% if form.instance.imagem %}
                                   <img id="preview" src="{{ form.instance.imagem.url }}" class="preview-img">
                                   {% else %}
                                   <img id="preview" class="preview-img" style="display:none">
                                   {% endif %}

                              </div>

                              <div class="d-flex justify-content-between mt-4">

                                   <a href="{% url 'itens' %}" class="btn btn-outline-secondary">
                                        ⬅ Voltar
                                   </a>

                                   <div>

                                        <button class="btn btn-primary">
                                             💾 Guardar
                                        </button>

                                   </div>

                              </div>

                         </form>
                         <form method="post" action="{% url 'apagar_item' form.instance.id %}">

                              {% csrf_token %}

                              <button class="btn btn-danger">
                                   🗑 Apagar Item
                              </button>

                         </form>
                         <hr class="my-4">



                    </div>

               </div>

          </div>

     </div>

     <script>

          const input = document.querySelector("input[type=file]");
          const preview = document.getElementById("preview");

          if (input) {

               input.addEventListener("change", function () {

                    const file = this.files[0];

                    if (file) {

                         preview.style.display = "block";
                         preview.src = URL.createObjectURL(file);

                    }

               });

          }

     </script>

</body>

</html>
