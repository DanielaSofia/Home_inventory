{% load static %}
<!DOCTYPE html>
<html lang="pt">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>
      {% block title %}
        Gestão da Casa
      {% endblock %}
    </title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
    <style>
      body {
        background: #f5f7fb;
      }
      .brand {
        font-weight: 700;
      }
      .container-main {
        padding-top: 24px;
        padding-bottom: 48px;
      }
      
      /* Global responsive helpers */
      img {
        max-width: 100%;
        height: auto;
        display: block;
      }
      .card {
        border-radius: 12px;
        box-shadow: 0 8px 22px rgba(16, 24, 40, 0.06);
        overflow: hidden;
      }
      .card-img-top {
        object-fit: cover;
      }
      .muted-small {
        font-size: 0.85rem;
        color: #6c757d;
      }
      
      /* Ensure modals are usable on small screens */
      @media (max-width: 576px) {
        .container-main {
          padding-left: 12px;
          padding-right: 12px;
        }
        .modal-dialog {
          max-width: 95%;
          margin: 0.5rem;
        }
        .navbar .nav-link {
          padding: 0.3rem 0.6rem;
        }
      }
      
      /* Prevent long words from overflowing containers */
      .break-word {
        overflow-wrap: break-word;
        word-break: break-word;
      }
    </style>
    {% block head %}
    {% endblock %}
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom">
      <div class="container">
        <a class="navbar-brand brand" href="{% url 'menu' %}">🏠 Casa</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu"><span class="navbar-toggler-icon"></span></button>
        <div class="collapse navbar-collapse" id="navMenu">
          <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
            <li class="nav-item">
              <a class="nav-link" href="{% url 'itens' %}">Itens</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="{% url 'desejos' %}">Desejos</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="{% url 'despensa' %}">Despensa</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="{% url 'lista_compras' %}">Lista</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="{% url 'dashboard' %}">Dashboard</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="{% url 'gastos' %}">Gastos</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <main class="container container-main">
      {% block content %}
      {% endblock %}
    </main>

    <footer class="bg-white border-top py-3 mt-auto">
      <div class="container text-muted small">© Gestão da Casa — interface remodelada</div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    {% block scripts %}
    {% endblock %}

    <script>
      // Close collapsed navbar on nav link click (mobile)
      document.addEventListener('DOMContentLoaded', function () {
        var navLinks = document.querySelectorAll('.navbar-collapse .nav-link')
        var bsCollapse = document.querySelector('.navbar-collapse')
        if (bsCollapse) {
          navLinks.forEach(function (link) {
            link.addEventListener('click', function () {
              var collapse = bootstrap.Collapse.getInstance(bsCollapse) || new bootstrap.Collapse(bsCollapse)
              if (window.getComputedStyle(document.querySelector('.navbar-toggler')).display !== 'none') {
                collapse.hide()
              }
            })
          })
        }
      })
    </script>
  </body>
</html>
