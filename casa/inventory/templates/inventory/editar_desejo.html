{% load static %}
<!DOCTYPE html>
<html lang="pt">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Editar Desejo</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'inventory/css/ui-revamp.css' %}">

</head>

<body>

    <div class="container app-shell py-5">

        <div class="row justify-content-center">

            <div class="col-lg-7">

                <div class="section-card p-4">

                    <h3 class="mb-4">
                        🌟 Editar Desejo
                    </h3>

                    <form method="post" enctype="multipart/form-data">

                        {% csrf_token %}

                        <div class="mb-3">
                            <label class="form-label">Nome</label>
                            {{ form.nome }}
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Descrição</label>
                            {{ form.descricao }}
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Valor estimado</label>
                            {{ form.valor }}
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Divisão</label>
                            {{ form.divisao }}
                        </div>

                        <div class="mb-3">

                            <label class="form-label">Imagem</label>

                            {{ form.imagem }}

                            {% if form.instance.imagem %}
                            <img src="{{ form.instance.imagem.url }}" class="preview-img">
                            {% endif %}

                        </div>

                        <div class="d-flex justify-content-between mt-4">

                            <a href="{% url 'desejos' %}" class="btn btn-outline-secondary">
                                ⬅ Voltar
                            </a>

                            <button class="btn btn-warning">
                                💾 Guardar
                            </button>

                        </div>

                    </form>

                    <hr class="my-4">

                    <form method="post" action="{% url 'apagar_desejo' form.instance.id %}">

                        {% csrf_token %}

                        <button class="btn btn-danger w-100">
                            🗑 Apagar Desejo
                        </button>

                    </form>

                </div>

            </div>

        </div>

    </div>

</body>

</html>
