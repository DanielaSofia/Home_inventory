{% load static %}
<!DOCTYPE html>
<html lang="pt">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Editar Desejo</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f4f6fb;
        }

        .card {
            border: none;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
        }

        .preview-img {
            width: 100%;
            max-height: 250px;
            object-fit: cover;
            border-radius: 10px;
            margin-top: 10px;
        }

        @media (prefers-color-scheme: dark) {

            body {
                background: #121212;
                color: white;
            }

            .card {
                background: #1e1e1e;
                color: white;
            }

        }
    </style>

</head>

<body>

    <div class="container py-5">

        <div class="row justify-content-center">

            <div class="col-lg-7">

                <div class="card p-4">

                    <h3 class="mb-4">
                        🌟 Editar Desejo
                    </h3>

                    <form method="post" enctype="multipart/form-data">

                        {% csrf_token %}

                        <div class="mb-3">
                            <label class="form-label">Nome</label>
                            {{ form.nome }}
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Descrição</label>
                            {{ form.descricao }}
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Valor estimado</label>
                            {{ form.valor }}
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Divisão</label>
                            {{ form.divisao }}
                        </div>

                        <div class="mb-3">

                            <label class="form-label">Imagem</label>

                            {{ form.imagem }}

                            {% if form.instance.imagem %}
                            <img src="{{ form.instance.imagem.url }}" class="preview-img">
                            {% endif %}

                        </div>

                        <div class="d-flex justify-content-between mt-4">

                            <a href="{% url 'desejos' %}" class="btn btn-outline-secondary">
                                ⬅ Voltar
                            </a>

                            <button class="btn btn-warning">
                                💾 Guardar
                            </button>

                        </div>

                    </form>

                    <hr class="my-4">

                    <form method="post" action="{% url 'apagar_desejo' form.instance.id %}">

                        {% csrf_token %}

                        <button class="btn btn-danger w-100">
                            🗑 Apagar Desejo
                        </button>

                    </form>

                </div>

            </div>

        </div>

    </div>

</body>

</html>
